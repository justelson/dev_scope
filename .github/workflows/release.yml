name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows release
        run: npm run build:win

      - name: Detect prerelease channel
        id: release_meta
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if [[ "$VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-([A-Za-z]+)\.[0-9]+)?$ ]]; then
            DISPLAY_VERSION="v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
            CHANNEL="$(echo "${BASH_REMATCH[5]}" | tr '[:upper:]' '[:lower:]')"
            if [[ -n "$CHANNEL" ]]; then
              echo "release_name=DevScope Air ${DISPLAY_VERSION} ${CHANNEL}" >> "$GITHUB_OUTPUT"
            else
              echo "release_name=DevScope Air ${DISPLAY_VERSION}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "release_name=DevScope Air ${VERSION}" >> "$GITHUB_OUTPUT"
          fi
          if [[ "$TAG" == *"-alpha."* || "$TAG" == *"-beta."* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        run: node scripts/maint/generate-release-notes.mjs > release-notes.md

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.release_meta.outputs.release_name }}
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          body_path: release-notes.md
          generate_release_notes: false
          files: |
            dist/releases/**/*.exe
            dist/releases/**/*.yml
            dist/releases/**/*.blockmap
